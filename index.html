<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#667eea">
  <title>遅刻記録システム - Surface版</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="container">
    <!-- メインエリア（2カラム） -->
    <div class="main-area">
      <!-- 左カラム -->
      <div class="left-column">
        <!-- ヘッダー情報 -->
        <div class="title-section">
          <h1>朝の遅刻者記録システム</h1>
          <div class="header-info">
            <div class="gate-time">門限時刻: <span id="gateTime">08:20</span></div>
            <span id="syncStatus" class="sync-status">同期済み</span>
            <span id="pendingCount" class="pending-count hidden">未送信: 0件</span>
          </div>
        </div>

        <!-- バーコード入力 -->
        <div class="input-section">
          <label class="section-label">生徒証番号入力欄</label>
          <input 
            type="text" 
            id="barcodeInput" 
            class="barcode-input" 
            placeholder="生徒証番号（6桁）" 
            autocomplete="off" 
            inputmode="numeric" 
            autofocus 
            maxlength="6"
            tabindex="1">
        </div>

        <!-- 生徒情報表示（1行のみ） -->
        <div class="student-section">
          <label class="section-label">生徒情報</label>
          <div id="studentDisplay" class="student-display">－</div>
        </div>

        <!-- 本日の記録 -->
        <div class="records-section">
          <div class="section-header">
            <span class="section-label">本日の遅刻者一覧</span>
            <span class="record-count" id="recordCount">0件</span>
          </div>
          <div id="recordsList" class="records-list">
            <div class="loading"><div class="spinner"></div>読み込み中...</div>
          </div>
        </div>
      </div>

      <!-- 右カラム：理由選択の大きなボックス -->
      <div class="right-column">
        <div class="reason-big-box">
          <label class="section-label">遅刻理由入力欄・保存欄</label>
          
          <div class="reason-content">
            <div id="reasonGrid" class="reason-grid"></div>
            
            <textarea 
              id="detailInput" 
              class="detail-input" 
              placeholder="詳細（任意）"
              tabindex="10"></textarea>

            <div class="checkbox-group">
              <label class="checkbox-label">
                <input type="checkbox" id="hasPhoneCall" tabindex="11">
                電話連絡あり
              </label>
              <label class="checkbox-label">
                <input type="checkbox" id="hasStudentCard" tabindex="12">
                生徒証あり
              </label>
            </div>

            <div class="action-buttons">
              <button type="button" class="btn btn-secondary" id="cancelBtn" tabindex="14">
                キャンセル<span class="shortcut">Esc</span>
              </button>
              <button type="button" class="btn btn-primary" id="saveBtn" tabindex="13">
                記録を保存<span class="shortcut">Enter</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="alertBox" class="hidden"></div>
  </div>

  <!-- モーダルアラート -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModalAlert()">
    <div class="modal-alert" onclick="event.stopPropagation()">
      <div class="modal-alert-icon">⚠️</div>
      <div class="modal-alert-title" id="modalTitle">入力エラー</div>
      <div class="modal-alert-message" id="modalMessage">メッセージ</div>
      <button class="modal-alert-button" onclick="closeModalAlert()">OK</button>
    </div>
  </div>

  <!-- スクリプト -->
  <script src="./config.js"></script>
  <script src="./db.js"></script>
  <script src="./app.js"></script>
  
  <script>
    // Service Worker 登録
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js')
        .then(reg => console.log('Service Worker registered'))
        .catch(err => console.error('Service Worker registration failed:', err));
    }
  </script>
</body>
</html>
